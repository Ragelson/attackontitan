<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сериал — Атака Титанов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="navbar__logo">
      <img src="img/logo.png" alt="Attack on Titan">
    </a>
    <ul class="navbar__links">
      <li><a href="../serial/index.html" class="active">Сериал</a></li>
      <li><a href="../characters/index.html">Персонажи</a></li>
      <li><a href="../music/index.html">Музыка</a></li>
      <li><a href="../arts/index.html">Галерея</a></li>
    </ul>
    <button class="navbar__hamburger" id="hamburger" aria-label="Открыть меню">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="navbar__drawer" id="drawer">
    <a href="../serial/index.html">Сериал</a>
    <a href="../characters/index.html">Персонажи</a>
    <a href="../music/index.html">Музыка</a>
    <a href="../arts/index.html">Галерея</a>
  </div>

  <div class="serial-layout">

    <!-- Player -->
    <section class="player-section">
      <div class="player-wrap">
        <video id="mainVideo" class="player-video"
               src="video/season1/episode1.mkv"
               controls autoplay></video>
      </div>
      <div class="player-info">
        <span class="player-badge">Сезон 1 · Серия 1</span>
        <h2 class="player-title" id="playerTitle">
          К тебе, спустя две тысячи лет: Падение Сигансины, часть 1
        </h2>
      </div>
    </section>

    <!-- Episodes -->
    <section class="episodes-section">
      <div class="container">

        <div class="episodes-head">
          <h2 class="episodes-heading">Все серии</h2>
          <div class="season-tabs" id="seasonTabs">
            <button class="season-tab is-active" data-season="all">Все</button>
            <button class="season-tab" data-season="1">Сезон 1</button>
            <button class="season-tab" data-season="2">Сезон 2</button>
            <button class="season-tab" data-season="3">Сезон 3</button>
            <button class="season-tab" data-season="4">Сезон 4</button>
          </div>
        </div>

        <ul class="episode-grid" id="episodeGrid"></ul>

        <div class="episodes-more">
          <button class="btn btn--outline show-more-btn" id="showMoreBtn">
            Показать все <i class="fas fa-chevron-down"></i>
          </button>
        </div>

      </div>
    </section>

  </div>

  <footer class="footer">
    <p class="footer__copy">Основано на манге ©Shingeki no Kyojin Хадзимэ Исаямы.</p>
  </footer>

  <script src="js/episodes.js"></script>
  <script src="js/app.js"></script>

</html>
